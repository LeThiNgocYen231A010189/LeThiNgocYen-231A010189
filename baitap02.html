<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 2 - Form Đăng Ký</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .form-container {
            max-width: 400px; 
            margin: 0 auto;  
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; 
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none; 
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Đăng Ký Tài Khoản</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="name">Họ và tên:</label>
                <input type="text" id="name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" required>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">Tôi đồng ý với điều khoản</label>
            </div>
            
            <button type="submit">Đăng Ký</button>
        </form>

        <div id="msgBox" class="message"></div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const msgBox = document.getElementById('msgBox');

        function showMessage(msg, isSuccess) {
            msgBox.textContent = msg;
            msgBox.style.display = 'block';
            msgBox.className = 'message ' + (isSuccess ? 'success' : 'error');
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const terms = document.getElementById('terms').checked;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

            if (!emailRegex.test(email)) {
                showMessage("Email không hợp lệ!", false);
                return;
            }

            if (!passwordRegex.test(password)) {
                showMessage("Mật khẩu phải từ 8 ký tự, gồm chữ hoa, chữ thường và số!", false);
                return;
            }

            if (!terms) {
                showMessage("Bạn phải đồng ý với điều khoản!", false);
                return;
            }

            const userData = {
                name: name,
                email: email
            };
            
            localStorage.setItem('registeredUser', JSON.stringify(userData));

            showMessage("Đăng ký thành công! Dữ liệu đã được lưu.", true);
            form.reset();
        });
    </script>

</body>
</html>
